<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ff2d2d">

<title>Promo Checkker</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
FLASH EFFECT
========================= */
.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  z-index: 1003;
  pointer-events: none;
}

.flash.active {
  animation: flashAnim 0.3s ease;
}

@keyframes flashAnim {
  0% { opacity: 0; }
  50% { opacity: 0.8; }
  100% { opacity: 0; }
}

/* =========================
CAMERA + OVERLAY
========================= */
.camera {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.camera.active {
  display: block;
}

/* overlay khusus */
#overlay {
  z-index: 1000;
  pointer-events: none;
}

/* video di bawah overlay */
#camera {
  z-index: 999;
}

/* backdrop */
body.camera-open::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 998;
}

/* =========================
SCAN BAR
========================= */
#scanBar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(0);

  display: flex;
  align-items: center;
  justify-content: space-between;

  width: 160px;
  height: 60px;

  background: #ff3b30;
  border-radius: 40px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.25);

  z-index: 1001;
  padding: 0 10px;

  backdrop-filter: blur(12px);
}

.scan-icon {
  flex: 1;
  height: 100%;
  border: none;
  background: transparent;

  display: flex;
  align-items: center;
  justify-content: center;
}

.divider {
  width: 1px;
  height: 60%;
  background: rgba(255,255,255,0.5);
}

/* CLOSE BUTTON */
.btn-close {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1001;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 18px;
  padding: 8px 12px;
  border-radius: 8px;
  display: none;
}

.btn-close.active {
  display: block;
}

/* ICON */
.icon-img {
  width: 26px;
  height: 26px;
  object-fit: contain;
  pointer-events: none;
  filter: brightness(0) invert(1);
}

/* =========================
AUTO HIDE ANIMATION
========================= */

#scanBar {
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* kondisi hidden */
#scanBar.hide {
  transform: translateX(-50%) translateY(120px);
  opacity: 0;
  pointer-events: none;
}

</style>

</head>

<body>

<header class="header">

  <div class="logo">
    <h1>CapeeX</h1>
    <p>Cek Promo • Scan SKU • Online</p>
  </div>

  <div class="search-box">
    <input id="search" placeholder="Cari SKU, artikel, deskripsi, brand">
    <button class="search-btn">🔍</button>
  </div>

</header>

<main>
  <div id="status">Loading...</div>
  <div id="result"></div>
</main>

<!-- SCAN BAR -->
<div id="scanBar">

  <button id="btnCamera" class="scan-icon">
    <img src="assets/camera.png" class="icon-img">
  </button>

  <div class="divider"></div>

  <button id="btnVoice" class="scan-icon">
    <img src="assets/mic.png" class="icon-img">
  </button>

</div>

<!-- FLASH -->
<div id="flash" class="flash"></div>

<!-- CLOSE BUTTON -->
<button id="btnClose" class="btn-close">✕</button>

<!-- CAMERA -->
<video id="camera" autoplay playsinline class="camera"></video>

<!-- OVERLAY (WAJIB untuk drag scan) -->
<canvas id="overlay" class="camera"></canvas>

<!-- CANVAS OCR -->
<canvas id="canvas" style="display:none"></canvas>

<!-- LIB OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<!-- APP -->
<script src="app.js"></script>

</body>
</html>
